<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHIKU PRO — Neural Command Center</title>
<meta name="description" content="CHIKU PRO AI Desktop Companion - Neural Command Center Interface">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Root ──────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #050e12;
  --bg-card: rgba(0,40,50,0.6);
  --border-glow: rgba(0,245,255,0.15);
  --cyan: #00f5ff;
  --teal: rgba(0,255,249,0.6);
  --success: #00ff88;
  --amber: #ffaa00;
  --error: #ff3366;
  --text: #c0e8ef;
  --text-dim: #4a7a85;
  --font-logo: 'Orbitron', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --font-label: 'Rajdhani', sans-serif;
}

html, body {
  width:100%; height:100%; overflow:hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.5;
}

/* ─── Noise Texture Overlay ─────────────────────────────────── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
}

/* ─── Particle Canvas ───────────────────────────────────────── */
#particles { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* ─── Grid Background ──────────────────────────────────────── */
#grid-bg {
  position:fixed; bottom:0; left:0; right:0; height:45%;
  z-index:0; pointer-events:none;
  background:
    linear-gradient(to bottom, var(--bg) 0%, transparent 30%),
    repeating-linear-gradient(90deg, rgba(0,245,255,0.04) 0px, transparent 1px, transparent 60px),
    repeating-linear-gradient(0deg, rgba(0,245,255,0.04) 0px, transparent 1px, transparent 60px);
  transform: perspective(400px) rotateX(45deg);
  transform-origin: bottom center;
}

/* ─── Layout Shell ──────────────────────────────────────────── */
#app {
  position:relative; z-index:1;
  display:grid;
  grid-template-rows: auto 1fr auto;
  grid-template-columns: 220px 1fr;
  grid-template-areas:
    "header header"
    "sidebar main"
    "footer footer";
  height:100vh;
  border:1px solid rgba(0,245,255,0.12);
  box-shadow: 0 0 30px rgba(0,245,255,0.06), inset 0 0 60px rgba(0,0,0,0.4);
}

/* ─── Header / Identity Bar ─────────────────────────────────── */
#header {
  grid-area: header;
  display:flex; align-items:center; justify-content:space-between;
  padding: 10px 20px;
  background: linear-gradient(180deg, rgba(0,30,40,0.9) 0%, rgba(5,14,18,0.95) 100%);
  border-bottom: 1px solid var(--border-glow);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.header-left { display:flex; align-items:center; gap:14px; }

/* Hexagon Logo */
.hex-logo {
  width:36px; height:36px; position:relative;
}
.hex-logo svg { width:100%; height:100%; }
.hex-logo .hex-pulse {
  animation: hexPulse 2s ease-in-out infinite;
}
@keyframes hexPulse {
  0%, 100% { opacity:0.5; filter: drop-shadow(0 0 4px var(--cyan)); }
  50% { opacity:1; filter: drop-shadow(0 0 12px var(--cyan)); }
}

.logo-text {
  font-family: var(--font-logo);
  font-weight:900; font-size:22px;
  letter-spacing: 4px;
  background: linear-gradient(90deg, var(--cyan), #00dde6, var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 10px rgba(0,245,255,0.3));
}
.logo-text .pro {
  font-size:13px; font-weight:700;
  vertical-align: super;
  letter-spacing:2px;
  background: linear-gradient(90deg, var(--amber), #ffcc44);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 6px rgba(255,170,0,0.3));
}

.header-center {
  font-family: var(--font-mono);
  font-size:11px; color: var(--text-dim);
  letter-spacing:2px; text-transform:uppercase;
}

.header-right { display:flex; align-items:center; gap:18px; }
.clock {
  font-family: var(--font-mono);
  font-size:16px; color: var(--cyan);
  letter-spacing:2px;
  text-shadow: 0 0 8px rgba(0,245,255,0.3);
}
.session-id {
  font-family: var(--font-mono);
  font-size:10px; color: var(--text-dim);
  letter-spacing:1px;
}
.status-pill {
  display:flex; align-items:center; gap:6px;
  background: rgba(0,255,136,0.1);
  border:1px solid rgba(0,255,136,0.3);
  border-radius:20px;
  padding: 3px 12px 3px 8px;
  font-family: var(--font-label);
  font-weight:600; font-size:11px;
  color: var(--success);
  letter-spacing:1.5px; text-transform:uppercase;
}
.status-dot {
  width:7px; height:7px; border-radius:50%;
  background: var(--success);
  box-shadow: 0 0 6px var(--success);
  animation: dotBlink 1.5s ease-in-out infinite;
}
@keyframes dotBlink {
  0%, 100% { opacity:1; } 50% { opacity:0.3; }
}

/* ─── Sidebar / System HUD ──────────────────────────────────── */
#sidebar {
  grid-area: sidebar;
  padding: 16px 14px;
  background: rgba(0,20,28,0.7);
  border-right:1px solid var(--border-glow);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  overflow-y:auto;
  display:flex; flex-direction:column; gap:14px;
}
#sidebar::-webkit-scrollbar { width:3px; }
#sidebar::-webkit-scrollbar-thumb { background: rgba(0,245,255,0.15); border-radius:4px; }

.hud-section {
  background: var(--bg-card);
  border:1px solid var(--border-glow);
  border-radius:8px;
  padding:12px;
}

.hud-label {
  font-family: var(--font-label);
  font-weight:600; font-size:10px;
  letter-spacing:2.5px; text-transform:uppercase;
  color: var(--text-dim);
  margin-bottom:6px;
}
.hud-value {
  font-family: var(--font-mono);
  font-size:14px;
  color: var(--cyan);
  text-shadow: 0 0 6px rgba(0,245,255,0.2);
}
.hud-value.amber { color: var(--amber); text-shadow: 0 0 6px rgba(255,170,0,0.2); }

/* Progress bars */
.bar-track {
  width:100%; height:4px; background:rgba(0,245,255,0.08);
  border-radius:2px; margin-top:5px; overflow:hidden;
}
.bar-fill {
  height:100%; border-radius:2px;
  background: linear-gradient(90deg, var(--cyan), var(--teal));
  box-shadow: 0 0 8px rgba(0,245,255,0.3);
  transition: width 1s ease;
}

.hud-divider {
  height:1px; background: var(--border-glow); margin:4px 0;
}

/* Status indicators */
.status-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:3px 0;
}
.status-indicator {
  display:flex; align-items:center; gap:6px;
}
.status-indicator .dot {
  width:6px; height:6px; border-radius:50%;
}
.dot.green { background:var(--success); box-shadow:0 0 5px var(--success); }
.dot.cyan { background:var(--cyan); box-shadow:0 0 5px var(--cyan); }
.dot.amber-dot { background:var(--amber); box-shadow:0 0 5px var(--amber); }

.status-indicator .label {
  font-family:var(--font-label);
  font-weight:600; font-size:11px;
  letter-spacing:1.5px; text-transform:uppercase;
  color: var(--text-dim);
}
.status-val {
  font-family:var(--font-mono);
  font-size:11px; font-weight:bold;
}
.status-val.on { color:var(--success); }
.status-val.sync { color:var(--cyan); }

/* ─── Main Area ─────────────────────────────────────────────── */
#main {
  grid-area: main;
  display:flex; flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* ─── Boot Sequence ─────────────────────────────────────────── */
#boot-screen {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  flex:1; padding:30px;
  transition: opacity 0.8s ease;
}
#boot-screen.hidden { opacity:0; pointer-events:none; position:absolute; inset:0; }

.boot-title-area {
  text-align:center; margin-bottom:30px;
}
.boot-logo {
  font-family:var(--font-logo); font-weight:900; font-size:42px;
  letter-spacing:8px;
  background: linear-gradient(90deg, var(--cyan), #0af, var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  filter: drop-shadow(0 0 20px rgba(0,245,255,0.25));
  margin-bottom:4px;
}
.boot-logo .pro-super {
  font-size:20px; vertical-align:super;
  background: linear-gradient(90deg, var(--amber), #fc0);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.boot-subtitle {
  font-family:var(--font-mono); font-size:12px;
  color:var(--text-dim); letter-spacing:6px; text-transform:uppercase;
}

/* Boot progress bar */
.boot-progress-container {
  width:min(500px, 80%); margin-bottom:28px;
}
.boot-progress-label {
  display:flex; justify-content:space-between;
  font-family:var(--font-label); font-weight:600; font-size:10px;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--text-dim); margin-bottom:5px;
}
.boot-progress-track {
  width:100%; height:3px; background:rgba(0,245,255,0.08);
  border-radius:2px; overflow:hidden;
}
.boot-progress-fill {
  height:100%; width:0%; border-radius:2px;
  background: linear-gradient(90deg, var(--cyan), var(--success));
  box-shadow: 0 0 12px rgba(0,245,255,0.4);
  transition: width 0.6s ease;
}

/* Boot rows */
.boot-list { width:min(500px, 80%); }
.boot-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid rgba(0,245,255,0.05);
  opacity:0;
  transform: translateY(8px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.boot-row.visible { opacity:1; transform:translateY(0); }

.boot-row-left { display:flex; align-items:center; gap:10px; }
.boot-index {
  font-family:var(--font-mono); font-size:11px;
  color:var(--text-dim); min-width:28px;
}
.boot-module-name {
  font-family:var(--font-mono); font-size:13px;
  color:var(--text);
}

.boot-spinner {
  width:14px; height:14px;
  border:2px solid rgba(0,245,255,0.15);
  border-top-color:var(--cyan);
  border-radius:50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.boot-check {
  font-size:14px; color:var(--success);
  text-shadow:0 0 6px var(--success);
  display:none;
}
.boot-row.done .boot-spinner { display:none; }
.boot-row.done .boot-check { display:inline; }

.boot-status {
  font-family:var(--font-mono); font-size:11px;
  color:var(--text-dim);
  min-width:90px; text-align:right;
  letter-spacing:1px; text-transform:uppercase;
}
.boot-row.done .boot-status { color:var(--success); text-shadow:0 0 4px rgba(0,255,136,0.3); }

/* ─── Chat Area ─────────────────────────────────────────────── */
#chat-screen {
  display:none; flex-direction:column; flex:1; overflow:hidden;
}
#chat-screen.active { display:flex; }

#messages {
  flex:1; overflow-y:auto; padding:20px 28px;
  display:flex; flex-direction:column; gap:14px;
}
#messages::-webkit-scrollbar { width:4px; }
#messages::-webkit-scrollbar-thumb { background:rgba(0,245,255,0.12); border-radius:4px; }

/* Message Bubbles */
.message {
  display:flex; gap:12px; max-width:85%;
  animation: msgIn 0.4s ease;
}
@keyframes msgIn {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}
.message.chiku { align-self:flex-start; }
.message.user { align-self:flex-end; flex-direction:row-reverse; }

.msg-avatar {
  width:34px; height:34px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.msg-avatar svg { width:28px; height:28px; }
.msg-avatar .rotating-hex { animation: slowSpin 8s linear infinite; }
@keyframes slowSpin { to { transform:rotate(360deg); } }

.msg-bubble {
  background: var(--bg-card);
  border:1px solid var(--border-glow);
  border-radius:12px;
  padding:12px 16px;
  position:relative;
}
.message.chiku .msg-bubble {
  border-top-left-radius:2px;
}
.message.user .msg-bubble {
  background: rgba(255,170,0,0.08);
  border-color: rgba(255,170,0,0.2);
  border-top-right-radius:2px;
}

.msg-sender {
  font-family:var(--font-label); font-weight:700;
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  margin-bottom:4px;
}
.message.chiku .msg-sender { color:var(--cyan); }
.message.user .msg-sender { color:var(--amber); }

.msg-text {
  font-family:var(--font-mono); font-size:13px;
  line-height:1.6; color:var(--text);
}
.message.user .msg-text { color: var(--amber); }

.msg-time {
  font-family:var(--font-mono); font-size:9px;
  color:var(--text-dim); margin-top:5px;
  text-align:right; letter-spacing:1px;
}

/* Typing cursor */
.cursor-blink {
  display:inline-block; width:7px; height:14px;
  background:var(--cyan);
  margin-left:2px; vertical-align:middle;
  animation: blink 0.8s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ─── Footer / Input Bar ────────────────────────────────────── */
#footer {
  grid-area: footer;
  padding:10px 16px;
  background: rgba(0,20,28,0.85);
  border-top:1px solid var(--border-glow);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}

/* Waveform */
#waveform-container {
  height:28px; margin-bottom:8px; display:none;
  align-items:center; justify-content:center; gap:2px;
}
#waveform-container.active { display:flex; }
.wave-bar {
  width:3px; border-radius:2px;
  background: var(--cyan);
  box-shadow: 0 0 4px rgba(0,245,255,0.3);
  animation: waveAnim 0.6s ease-in-out infinite alternate;
}
@keyframes waveAnim {
  0% { height:4px; opacity:0.4; }
  100% { height:20px; opacity:1; }
}

.input-row {
  display:flex; align-items:center; gap:10px;
}

#mic-btn {
  width:38px; height:38px; border:none; border-radius:50%;
  background: rgba(0,245,255,0.08);
  border:1px solid rgba(0,245,255,0.2);
  color:var(--cyan); font-size:16px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition: all 0.3s ease;
  flex-shrink:0;
}
#mic-btn:hover { background:rgba(0,245,255,0.15); box-shadow:0 0 12px rgba(0,245,255,0.2); }
#mic-btn.active {
  background:rgba(255,51,102,0.15);
  border-color:rgba(255,51,102,0.4);
  color:var(--error);
  box-shadow:0 0 16px rgba(255,51,102,0.25);
  animation: micGlow 1s ease-in-out infinite;
}
@keyframes micGlow {
  0%,100% { box-shadow:0 0 8px rgba(255,51,102,0.2); }
  50% { box-shadow:0 0 20px rgba(255,51,102,0.4); }
}

#text-input {
  flex:1; background:rgba(0,40,50,0.4);
  border:1px solid rgba(0,245,255,0.1);
  border-radius:8px; padding:9px 14px;
  font-family:var(--font-mono); font-size:13px;
  color:var(--text); outline:none;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
#text-input::placeholder { color:var(--text-dim); }
#text-input:focus {
  border-color:rgba(0,245,255,0.3);
  box-shadow: 0 0 12px rgba(0,245,255,0.08);
}

#send-btn {
  width:38px; height:38px; border:none; border-radius:8px;
  background: linear-gradient(135deg, var(--cyan), #00c8d4);
  color:var(--bg); font-size:16px; font-weight:bold;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition: all 0.3s ease; flex-shrink:0;
}
#send-btn:hover { transform:scale(1.05); box-shadow:0 0 14px rgba(0,245,255,0.35); }

#gesture-icon {
  width:30px; height:30px;
  display:flex; align-items:center; justify-content:center;
  color:var(--text-dim); font-size:16px;
  flex-shrink:0;
}

/* ─── Scanline overlay ──────────────────────────────────────── */
#scanline {
  position:fixed; inset:0; z-index:999; pointer-events:none;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 2px,
    rgba(0,245,255,0.008) 2px,
    rgba(0,245,255,0.008) 4px
  );
}
</style>
</head>
<body>

<!-- Scanline overlay -->
<div id="scanline"></div>

<!-- Particle canvas -->
<canvas id="particles"></canvas>

<!-- Grid floor -->
<div id="grid-bg"></div>

<!-- ═══ App Shell ═══ -->
<div id="app">

  <!-- ─── Header ─── -->
  <header id="header">
    <div class="header-left">
      <div class="hex-logo">
        <svg viewBox="0 0 40 40" class="hex-pulse">
          <polygon points="20,2 36,11 36,29 20,38 4,29 4,11"
            fill="none" stroke="#00f5ff" stroke-width="1.5"
            stroke-linejoin="round"/>
          <polygon points="20,8 30,14 30,26 20,32 10,26 10,14"
            fill="rgba(0,245,255,0.08)" stroke="#00f5ff" stroke-width="0.5"
            stroke-linejoin="round"/>
          <text x="20" y="24" text-anchor="middle" fill="#00f5ff"
            font-family="Orbitron" font-size="10" font-weight="900">C</text>
        </svg>
      </div>
      <div class="logo-text">CHIKU<span class="pro">PRO</span></div>
    </div>

    <div class="header-center">AI DESKTOP COMPANION &middot; V2.0</div>

    <div class="header-right">
      <span class="session-id" id="sessionId">SESSION: ----</span>
      <span class="clock" id="clock">--:--:--</span>
      <div class="status-pill">
        <span class="status-dot"></span>ONLINE
      </div>
    </div>
  </header>

  <!-- ─── Sidebar ─── -->
  <aside id="sidebar">
    <!-- CPU -->
    <div class="hud-section">
      <div class="hud-label">CPU</div>
      <div class="hud-value" id="cpuVal">0%</div>
      <div class="bar-track"><div class="bar-fill" id="cpuBar" style="width:0%"></div></div>
    </div>

    <!-- RAM -->
    <div class="hud-section">
      <div class="hud-label">RAM</div>
      <div class="hud-value" id="ramVal">0 GB</div>
      <div class="bar-track"><div class="bar-fill" id="ramBar" style="width:0%"></div></div>
    </div>

    <!-- Model -->
    <div class="hud-section">
      <div class="hud-label">MODEL</div>
      <div class="hud-value">LLAMA 3.2</div>
    </div>

    <!-- Session -->
    <div class="hud-section">
      <div class="hud-label">SESSION</div>
      <div class="hud-value" id="sideSession" style="font-size:12px">----</div>
    </div>

    <!-- Region -->
    <div class="hud-section">
      <div class="hud-label">REGION</div>
      <div class="hud-value" style="font-size:12px">AP-SE-1</div>
    </div>

    <!-- User -->
    <div class="hud-section">
      <div class="hud-label">USER</div>
      <div class="hud-value amber">GAVUS</div>
    </div>

    <div class="hud-divider"></div>

    <!-- Status indicators -->
    <div class="hud-section" style="display:flex;flex-direction:column;gap:6px;">
      <div class="status-row">
        <div class="status-indicator"><span class="dot green"></span><span class="label">Voice</span></div>
        <span class="status-val on">ON</span>
      </div>
      <div class="status-row">
        <div class="status-indicator"><span class="dot green"></span><span class="label">Vision</span></div>
        <span class="status-val on">ON</span>
      </div>
      <div class="status-row">
        <div class="status-indicator"><span class="dot green"></span><span class="label">Gesture</span></div>
        <span class="status-val on">ON</span>
      </div>
      <div class="status-row">
        <div class="status-indicator"><span class="dot cyan"></span><span class="label">Memory</span></div>
        <span class="status-val sync">SYNC</span>
      </div>
      <div class="status-row">
        <div class="status-indicator"><span class="dot green"></span><span class="label">DB</span></div>
        <span class="status-val on">OK</span>
      </div>
    </div>
  </aside>

  <!-- ─── Main Content ─── -->
  <main id="main">
    <!-- Boot Sequence -->
    <div id="boot-screen">
      <div class="boot-title-area">
        <div class="boot-logo">CHIKU<span class="pro-super">PRO</span></div>
        <div class="boot-subtitle">AI Desktop Companion &middot; V2.0</div>
      </div>

      <div class="boot-progress-container">
        <div class="boot-progress-label">
          <span>SYSTEM READY</span>
          <span id="bootPercent">0%</span>
        </div>
        <div class="boot-progress-track">
          <div class="boot-progress-fill" id="bootBar"></div>
        </div>
      </div>

      <div class="boot-list" id="bootList">
        <!-- JS-populated -->
      </div>
    </div>

    <!-- Chat Area -->
    <div id="chat-screen">
      <div id="messages"></div>
    </div>
  </main>

  <!-- ─── Footer ─── -->
  <footer id="footer">
    <div id="waveform-container">
      <!-- JS-populated wave bars -->
    </div>
    <div class="input-row">
      <button id="mic-btn" title="Toggle microphone">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <input type="text" id="text-input" placeholder="Speak or type to GAVUS's AI..." autocomplete="off" />
      <button id="send-btn" title="Send message">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
      <div id="gesture-icon" title="Gesture recognition">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 11V6a2 2 0 0 0-4 0"/>
          <path d="M14 10V4a2 2 0 0 0-4 0v2"/>
          <path d="M10 10.5V6a2 2 0 0 0-4 0v8"/>
          <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
        </svg>
      </div>
    </div>
  </footer>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CHIKU PRO — Neural Command Center (Frontend Logic)
// ═══════════════════════════════════════════════════════════════

// ─── Utilities ─────────────────────────────────────────────────
function genSessionId() {
  const chars = '0123456789ABCDEF';
  let id = '';
  for (let i = 0; i < 5; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}

function formatTime(d) {
  return d.toLocaleTimeString('en-GB', { hour12: false });
}

function shortTime(d) {
  return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
}

// ─── Session & Clock ───────────────────────────────────────────
const SESSION = genSessionId();
document.getElementById('sessionId').textContent = 'SESSION: ' + SESSION;
document.getElementById('sideSession').textContent = SESSION;

function tickClock() {
  document.getElementById('clock').textContent = formatTime(new Date());
}
tickClock();
setInterval(tickClock, 1000);

// ─── Simulated System Stats ───────────────────────────────────
function updateStats() {
  const cpu = 18 + Math.floor(Math.random() * 20);
  const ramGB = (2.8 + Math.random() * 2.0).toFixed(1);
  const ramPct = Math.round((parseFloat(ramGB) / 16) * 100);

  document.getElementById('cpuVal').textContent = cpu + '%';
  document.getElementById('cpuBar').style.width = cpu + '%';
  document.getElementById('ramVal').textContent = ramGB + ' GB';
  document.getElementById('ramBar').style.width = ramPct + '%';
}
updateStats();
setInterval(updateStats, 3000);

// ─── Particles ─────────────────────────────────────────────────
(function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H;
  const particles = [];
  const COUNT = 60;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < COUNT; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.5,
      vy: -(Math.random() * 0.4 + 0.1),
      vx: (Math.random() - 0.5) * 0.15,
      a: Math.random() * 0.4 + 0.1
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,245,255,${p.a})`;
      ctx.fill();

      p.x += p.vx;
      p.y += p.vy;
      if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
      if (p.x < -5) p.x = W + 5;
      if (p.x > W + 5) p.x = -5;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ─── Waveform Bars ─────────────────────────────────────────────
(function initWaveform() {
  const container = document.getElementById('waveform-container');
  for (let i = 0; i < 40; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.style.animationDelay = (Math.random() * 0.6).toFixed(2) + 's';
    bar.style.animationDuration = (0.3 + Math.random() * 0.5).toFixed(2) + 's';
    container.appendChild(bar);
  }
})();

// ─── Boot Sequence ─────────────────────────────────────────────
const BOOT_MODULES = [
  { name: 'Checking Ollama background service...', status: 'OK' },
  { name: 'Establishing Supabase connection...', status: 'CONNECTED' },
  { name: 'Restoring long-term memory (3 facts)...', status: 'RESTORED' },
  { name: 'Initializing speech recognition...', status: 'READY' },
  { name: 'Loading DeepFace face-lock module...', status: 'ARMED' },
  { name: 'Activating gesture engine (MediaPipe)...', status: 'ONLINE' },
  { name: 'Syncing task queue & reminders...', status: '4 PENDING' },
];

function runBootSequence() {
  const list = document.getElementById('bootList');
  const bar = document.getElementById('bootBar');
  const pct = document.getElementById('bootPercent');

  // Create rows
  BOOT_MODULES.forEach((mod, i) => {
    const row = document.createElement('div');
    row.className = 'boot-row';
    row.id = 'boot-row-' + i;
    row.innerHTML = `
      <div class="boot-row-left">
        <span class="boot-index">[${String(i + 1).padStart(2, '0')}]</span>
        <span class="boot-module-name">${mod.name}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="boot-spinner"></div>
        <span class="boot-check">✓</span>
        <span class="boot-status">${mod.status}</span>
      </div>
    `;
    list.appendChild(row);
  });

  // Animate rows one by one
  let idx = 0;
  const total = BOOT_MODULES.length;

  function nextModule() {
    if (idx >= total) {
      // Boot done → transition to chat
      setTimeout(transitionToChat, 600);
      return;
    }

    const row = document.getElementById('boot-row-' + idx);
    row.classList.add('visible');

    // After a random delay, mark as done
    const delay = 400 + Math.random() * 500;
    setTimeout(() => {
      row.classList.add('done');
      idx++;
      const progress = Math.round((idx / total) * 100);
      bar.style.width = progress + '%';
      pct.textContent = progress + '%';
      nextModule();
    }, delay);
  }

  // Start after a small delay
  setTimeout(nextModule, 500);
}

function transitionToChat() {
  const bootScreen = document.getElementById('boot-screen');
  const chatScreen = document.getElementById('chat-screen');

  bootScreen.classList.add('hidden');
  setTimeout(() => {
    bootScreen.style.display = 'none';
    chatScreen.classList.add('active');

    // Greeting
    const hour = new Date().getHours();
    let greet = 'Hey there';
    if (hour < 12) greet = 'Good morning';
    else if (hour < 17) greet = 'Good afternoon';
    else if (hour < 21) greet = 'Good evening';

    addChikuMessage(`${greet}, Gavus! All systems operational. How can I help you?`);
  }, 800);
}

// ─── Chat Messages ─────────────────────────────────────────────
const messagesEl = document.getElementById('messages');

function hexAvatarSVG() {
  return `<svg viewBox="0 0 36 36" class="rotating-hex">
    <polygon points="18,2 32,10 32,26 18,34 4,26 4,10"
      fill="rgba(0,245,255,0.06)" stroke="#00f5ff" stroke-width="1" stroke-linejoin="round"/>
    <text x="18" y="22" text-anchor="middle" fill="#00f5ff"
      font-family="Orbitron" font-size="9" font-weight="900">C</text>
  </svg>`;
}

function userAvatarSVG() {
  return `<svg viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="15" fill="rgba(255,170,0,0.08)" stroke="#ffaa00" stroke-width="1"/>
    <text x="18" y="22" text-anchor="middle" fill="#ffaa00"
      font-family="Orbitron" font-size="10" font-weight="700">G</text>
  </svg>`;
}

function addChikuMessage(text) {
  const msg = document.createElement('div');
  msg.className = 'message chiku';
  const ts = shortTime(new Date());
  msg.innerHTML = `
    <div class="msg-avatar">${hexAvatarSVG()}</div>
    <div class="msg-bubble">
      <div class="msg-sender">CHIKU</div>
      <div class="msg-text"><span class="typewriter-target"></span><span class="cursor-blink"></span></div>
      <div class="msg-time">${ts}</div>
    </div>
  `;
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  // Typewriter effect
  const target = msg.querySelector('.typewriter-target');
  const cursor = msg.querySelector('.cursor-blink');
  let charIdx = 0;
  const typeInterval = setInterval(() => {
    if (charIdx < text.length) {
      target.textContent += text[charIdx];
      charIdx++;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } else {
      clearInterval(typeInterval);
      // Remove cursor after 2s
      setTimeout(() => cursor.remove(), 2000);
    }
  }, 25);
}

function addUserMessage(text) {
  const msg = document.createElement('div');
  msg.className = 'message user';
  const ts = shortTime(new Date());
  msg.innerHTML = `
    <div class="msg-avatar">${userAvatarSVG()}</div>
    <div class="msg-bubble">
      <div class="msg-sender">GAVUS</div>
      <div class="msg-text">${escapeHtml(text)}</div>
      <div class="msg-time">${ts}</div>
    </div>
  `;
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ─── Simulated AI Responses ────────────────────────────────────
const AI_RESPONSES = [
  "I'm analyzing that for you now. One moment...",
  "Done. Is there anything else you need?",
  "I've processed your request. All systems are nominal.",
  "Understood. Running diagnostics on the relevant subsystems.",
  "Acknowledged. I'll handle that right away.",
  "Request queued. Executing in the background.",
  "I've updated my knowledge base with that information.",
  "Checking internal memory... Found relevant context for your query.",
];

function getAiResponse() {
  return AI_RESPONSES[Math.floor(Math.random() * AI_RESPONSES.length)];
}

// ─── Input Handling ────────────────────────────────────────────
const textInput = document.getElementById('text-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
let micActive = false;

function handleSend() {
  const val = textInput.value.trim();
  if (!val) return;
  addUserMessage(val);
  textInput.value = '';

  // Simulate CHIKU response after a delay
  setTimeout(() => {
    addChikuMessage(getAiResponse());
  }, 800 + Math.random() * 600);
}

sendBtn.addEventListener('click', handleSend);
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

micBtn.addEventListener('click', () => {
  micActive = !micActive;
  micBtn.classList.toggle('active', micActive);
  document.getElementById('waveform-container').classList.toggle('active', micActive);
});

// ─── Start ─────────────────────────────────────────────────────
runBootSequence();
</script>
</body>
</html>
